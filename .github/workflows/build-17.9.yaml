# https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-docker-images

on:
  workflow_dispatch:
  push:
    tags:
      - v17.9-system-*

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - runner: ubuntu-24.04
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.os.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=v(.*),group=1,suffix=-${{ matrix.os.arch }}
          flavor: |
            latest=false

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: 17.9-system.Dockerfile
          push: true
          platforms: ${{ matrix.os.platform }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.os.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.os.platform }}
          provenance: false
          sbom: false

  merge-manifests:
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      packages: write
      contents: read # Needed to get repository owner and name
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag from ref
        id: get_tag
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Lowercase image name
        id: lc
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: echo "name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT

      - name: Create and push manifest
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ steps.lc.outputs.name }}
          TAG=${{ steps.get_tag.outputs.tag }}
          docker manifest create $IMAGE:$TAG \
            --amend $IMAGE:$TAG-amd64 \
            --amend $IMAGE:$TAG-arm64
          docker manifest push $IMAGE:$TAG
